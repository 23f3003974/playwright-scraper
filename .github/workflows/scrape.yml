name: Scrape Table Sums

on:
  workflow_dispatch:  # Lets you run it manually with a button
  push:
    branches: [main]  # Also runs whenever you push code

jobs:
  scrape:
    runs-on: ubuntu-latest  # Use a Linux computer in the cloud

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: 23f3003974@ds.study.iitm.ac.in - Scrape and sum all table numbers
        run: node scrape.js
